# ─────────────────────────────────────────────────────────────
# ci-feature.yml
# Triggers: Every push to feature/dockerize-app
# Purpose:  Fast feedback — unit + integration tests only.
#           No E2E, no Allure publish. Just pass/fail quickly.
# ─────────────────────────────────────────────────────────────

name: "[Feature] Unit + Integration Tests"

on:
  push:
    branches:
      - "feature/dockerize-app"

jobs:
  # ── JOB 1: Unit Tests ──────────────────────────────────────
  unit-tests:
    name: Unit Tests (Pydantic Schemas)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest allure-pytest

      - name: Run unit tests
        run: |
          pytest tests/unit/ -m unit -v

  # ── JOB 2: Integration Tests ───────────────────────────────
  integration-tests:
    name: Integration Tests (FastAPI + DB)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=development/' .env

      - name: Start DB and Reports API
        run: |
          docker compose up -d db reports_api

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for services..."; sleep 5;
            done'
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest httpx allure-pytest

      - name: Run integration tests
        run: |
          pytest tests/integration/ -m integration -v

      - name: Tear down services
        if: always()
        run: docker compose down -v