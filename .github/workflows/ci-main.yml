# ─────────────────────────────────────────────────────────────
# ci-main.yml
# Triggers: PR opened/updated targeting main branch
#           (i.e. when qa → main PR is created)
# Purpose:  Final production gate — full test pyramid
#           + Allure report published live to GitHub Pages.
#
# Prerequisites:
#   1. After first successful run, go to repo Settings → Pages
#      → Source: Deploy from branch → gh-pages → /(root) → Save
#   2. GITHUB_TOKEN is available automatically — no setup needed.
# ─────────────────────────────────────────────────────────────

name: "[Main] Production Gate + Allure Pages Deploy"

on:
  pull_request:
    branches:
      - main

jobs:
  # ── JOB 1: Unit Tests ──────────────────────────────────────
  unit-tests:
    name: Unit Tests (Pydantic Schemas)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest allure-pytest

      - name: Run unit tests
        run: |
          pytest tests/unit/ -m unit -v \
            --alluredir=allure-results/unit

      - name: Upload Allure results (unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/unit

  # ── JOB 2: Integration Tests ───────────────────────────────
  integration-tests:
    name: Integration Tests (FastAPI + DB)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=production/' .env

      - name: Start DB and Reports API
        run: |
          docker compose up -d db reports_api

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for services..."; sleep 5;
            done'
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest httpx allure-pytest

      - name: Run integration tests
        run: |
          pytest tests/integration/ -m integration -v \
            --alluredir=allure-results/integration

      - name: Upload Allure results (integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-integration
          path: allure-results/integration

      - name: Tear down services
        if: always()
        run: docker compose down -v

  # ── JOB 3: E2E Tests ───────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright Full Stack)
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=production/' .env

      - name: Build and start full stack
        run: |
          docker compose up -d db reports_api app

      - name: Wait for full stack to be ready
        run: |
          timeout 180 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for full stack..."; sleep 5;
            done'
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright allure-pytest
          playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -m e2e -v \
            --alluredir=allure-results/e2e

      - name: Upload Allure results (e2e)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/e2e

      - name: Tear down full stack
        if: always()
        run: docker compose down -v

  # ── JOB 4: Publish Allure Report to GitHub Pages ───────────
  allure-pages-deploy:
    name: Publish Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Checkout gh-pages branch (for history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true  # branch won't exist on first run

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Install Allure CLI via npm
        run: npm install -g allure-commandline --save-dev

      - name: Copy previous Allure history (for trend graphs)
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-results/history
            echo "Previous history copied."
          else
            echo "No previous history found — first run."
          fi

      - name: Generate Allure HTML Report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report