# ─────────────────────────────────────────────────────────────
# ci-qa.yml
# Triggers: PR opened/updated targeting qa branch
#           (i.e. when feature/dockerize-app → qa PR is created)
# Purpose:  Full test pyramid (unit + integration + E2E)
#           with Allure results uploaded as a downloadable artifact.
# ─────────────────────────────────────────────────────────────

name: "[QA] Full Test Suite + Allure Artifact"

on:
  pull_request:
    branches:
      - qa

jobs:
  # ── JOB 1: Unit Tests ──────────────────────────────────────
  unit-tests:
    name: Unit Tests (Pydantic Schemas)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest allure-pytest

      - name: Run unit tests
        run: |
          pytest tests/unit/ -m unit -v \
            --alluredir=allure-results/unit

      - name: Upload Allure results (unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/unit

  # ── JOB 2: Integration Tests ───────────────────────────────
  integration-tests:
    name: Integration Tests (FastAPI + DB)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env

      - name: Start DB and Reports API
        run: |
          docker compose up -d db reports_api

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for services..."; sleep 5;
            done'
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.reports.txt
          pip install pytest httpx allure-pytest

      - name: Run integration tests
        env:
          FASTAPI_URL: http://localhost:8000
        run: |
          pytest tests/integration/ -m integration -v \
            --alluredir=allure-results/integration

      - name: Upload Allure results (integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-integration
          path: allure-results/integration

      - name: Tear down services
        if: always()
        run: docker compose down -v

  # ── JOB 3: E2E Tests ───────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright Full Stack)
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create credentials file
        run: |
          mkdir -p src/config
          echo '${{ secrets.TEST_CREDENTIALS }}' > src/config/credentials.json

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env

      - name: Build and start full stack
        run: |
          docker compose up -d db reports_api app

      - name: Wait for full stack to be ready
        run: |
          timeout 180 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for full stack..."; sleep 5;
            done'
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright allure-pytest

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:8080/
          DB_HOST: localhost
        run: |
          pytest tests/e2e/ -m e2e -v \
            --alluredir=allure-results/e2e

      - name: Upload Allure results (e2e)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/e2e

      - name: Tear down full stack
        if: always()
        run: docker compose down -v

  # ── JOB 4: a11y Accessibility Tests ─────────────────────────────
  accessibility-tests:
    name: a11y Accessibility Tests (axe-core WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create credentials file
        run: |
          mkdir -p src/config
          echo '${{ secrets.TEST_CREDENTIALS }}' > src/config/credentials.json

      - name: Copy environment file
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env

      - name: Build and start full stack
        run: |
          docker compose up -d db reports_api app

      - name: Wait for full stack to be ready
        run: |
          timeout 180 bash -c \
            'until docker compose ps | grep -E "healthy"; do
              echo "Waiting for full stack..."; sleep 5;
            done'
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright allure-pytest pytest-asyncio \
            axe-playwright-python

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run accessibility tests
        env:
          BASE_URL: http://localhost:8080/
          DB_HOST: localhost
        run: |
          pytest tests/accessibility/ -m a11y -v \
            --alluredir=allure-results/accessibility

      - name: Upload Allure results (accessibility)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-accessibility
          path: allure-results/accessibility

      - name: Tear down full stack
        if: always()
        run: docker compose down -v

  # ── JOB 5: Generate Allure Report + Upload as Artifact ─────
  allure-artifact:
    name: Bundle Allure Report Artifact
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, accessibility-tests]
    if: always()

    steps:
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Install Allure CLI via npm
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure HTML Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload full Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report-qa
          path: allure-report
          retention-days: 14