services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: clockwise
      DB_USERNAME: root
      DB_PASSWORD: rootpass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/login.php"]  # port 80 inside container
      interval: 15s      # check every 15s
      timeout: 10s       # give each check 10s to respond
      retries: 5         # try up to 5 times
      start_period: 30s  # give the container 30s to boot

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: clockwise
      MYSQL_USER: clockwise_user
      MYSQL_PASSWORD: clockwise_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./clockwise.sql:/docker-entrypoint-initdb.d/clockwise.sql

  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./tests:/app/tests
      - ./report:/app/report       # persist your HTML report outside the container
      - ./src/config:/app/config   # if you have any config files needed for tests
    environment:
      BASE_URL: http://app
    command: [
      "sh", "-c",
      "until curl -sf http://app/login.php; do echo 'Waiting for app...'; sleep 3; done && pip install 'pytest-html==3.2.0' -q --break-system-packages && pytest tests/playwright -v --html=report/report.html --self-contained-html"
    ]

volumes:
  db_data: