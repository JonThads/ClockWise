[pytest]
markers =
    unit: Fast, isolated tests with no external dependencies
    integration: Tests that require a running FastAPI server and database
    e2e: Full browser-driven end-to-end tests using Playwright
    a11y: Axe-core powered automated accessibility scans (WCAG 2.1 AA)

addopts = --strict-markers
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .